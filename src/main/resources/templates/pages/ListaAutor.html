<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
    <title>Lista Autor</title>
</head>
<body>
<!-- LISTA LIBROS -->
<div class="container mt-3">
  <form th:action="@{/autor}" method="get" class="mb-3">
  </form>
  <table class="table table-hover">
    <thead>
    <tr>
      <th>Código</th>
      <th>Nombre</th>
      <th>Nacionalidad</th>
      <th>Fecha Nacimiento</th>
      <th>Opciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="autor: ${autor}">
      <td th:text="${autor.id}"></td>
      <td th:text="${autor.nombre}"></td>
      <td th:text="${autor.nacionalidad}"></td>
      <td th:text="${autor.fechaNacimiento}"></td>
      <th

      <td>
        <!-- Enlace -->
        <a th:href="@{/autor/} + ${autor.id}" class="btn btn-actualizar">Libros</a>
        <a th:href="@{/editar-autor/} + ${autor.id}" class="btn btn-actualizar">Actualizar</a>
        <a th:href="@{/eliminar-autor/} + ${autor.id}" class="btn btn-eliminar">Eliminar</a>
      </td>
    </tr>
    </tbody>
  </table>

  <a th:href="@{/formularioAutor}" class="btn btn-guardar">Nuevo Producto</a>
</div>
</body>
</html>
